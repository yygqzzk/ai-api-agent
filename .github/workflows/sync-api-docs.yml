name: Sync API Docs to Knowledge Base

on:
  push:
    tags:
      - '*'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect API docs
        id: api-files
        shell: bash
        run: |
          files=$(find docs/api -type f \( -name '*.json' -o -name '*.yaml' -o -name '*.yml' \) | sort || true)
          {
            echo 'files<<EOF'
            echo "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Sync docs to API assistant
        if: steps.api-files.outputs.files != ''
        env:
          API_ASSISTANT_URL: ${{ secrets.API_ASSISTANT_URL }}
          API_ASSISTANT_TOKEN: ${{ secrets.API_ASSISTANT_TOKEN }}
          API_DOC_META_OVERRIDES_JSON: ${{ vars.API_DOC_META_OVERRIDES_JSON }}
        shell: bash
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            service_name=$(basename "$file")
            service_name=${service_name%.*}
            rendered_content=$(ruby scripts/render_sync_api_doc.rb "$file" "$service_name")
            content=$(printf '%s' "$rendered_content" | jq -Rs .)
            curl -fsSL -X POST "$API_ASSISTANT_URL/webhook/sync" \
              -H "Authorization: Bearer $API_ASSISTANT_TOKEN" \
              -H "Content-Type: application/json" \
              -d @- <<EOF
          {
            "event": "push",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "files": [{
              "path": "$file",
              "action": "modified",
              "service": "$service_name",
              "content": $content
            }]
          }
          EOF
          done <<< "${{ steps.api-files.outputs.files }}"
